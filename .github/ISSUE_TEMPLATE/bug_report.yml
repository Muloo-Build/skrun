name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Steps to reproduce, or link to a repo/snippet.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Skrun version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "OS, Node version, package manager"
      placeholder: "macOS 14, Node 22, pnpm 9"
