name: dev/code-review
version: 1.0.0

model:
  provider: google
  name: gemini-2.5-flash

inputs:
  - name: code
    type: string
    required: true
    description: The code to review

outputs:
  - name: review
    type: string
    description: Summary of code quality
  - name: issues
    type: array
    description: List of issues found
  - name: score
    type: number
    description: Code quality score 0-100

permissions:
  network: []
  filesystem: read-only
  secrets: []

runtime:
  timeout: 60s
  sandbox: strict

state:
  type: none
  ttl: 30d

tests:
  - name: basic-review
    input:
      code: "function add(a, b) { return a + b; }"
    assert: output.score >= 0
